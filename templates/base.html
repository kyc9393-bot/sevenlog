<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="eFalOR_VDf3xhccxqy8VgaCfBUEERHG1KZIkK5I5L4g" />
<title>{{ title }}</title>
<meta name="description" content="{{ description }}">
<link rel="canonical" href="{{ canonical }}">
{{ robots_meta }}
<meta property="og:type" content="{{ og_type }}">
<meta property="og:title" content="{{ title }}">
<meta property="og:description" content="{{ description }}">
<meta property="og:url" content="{{ canonical }}">
<meta property="og:site_name" content="{{ site_name }}">
<meta name="twitter:card" content="summary">
<link rel="alternate" type="application/rss+xml" title="{{ site_name }} RSS" href="{{ base_url }}/rss.xml">
<link rel="icon" href="{{ base_url }}/static/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="{{ base_url }}/static/style.css">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
{{ adsense_head }}
{{ json_ld }}
</head>
<body>
<header class="site-header">
  <div class="wrap header-inner">
    <a href="{{ base_url }}/" class="logo">7<span>세븐로그</span></a>
    <nav class="site-nav" aria-label="카테고리">
      {{ nav_links }}
    </nav>
  </div>
</header>

<main class="wrap">
{{ content }}
</main>

<footer class="site-footer">
  <div class="wrap">
    <p class="footer-links">
      <a href="{{ base_url }}/about/">소개</a> ·
      <a href="{{ base_url }}/contact/">문의</a> ·
      <a href="{{ base_url }}/privacy/">개인정보처리방침</a> ·
      <a href="{{ base_url }}/terms/">이용약관</a> ·
      <a href="{{ base_url }}/rss.xml">RSS</a>
    </p>
    <p class="copyright">© {{ year }} {{ site_name }}. All rights reserved.</p>
  </div>
</footer>
</body>
</html>
